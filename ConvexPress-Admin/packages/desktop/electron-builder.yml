# ConvexPress Desktop - electron-builder configuration
# Packages the Vite SPA + Electron shell into distributable installers.

appId: com.convexpress.admin
productName: ConvexPress

files:
  - dist-electron/**/*
  - dist/**/*
  - package.json

extraResources:
  - from: resources/iconTemplate.png
    to: iconTemplate.png
  - from: resources/iconTemplate@2x.png
    to: iconTemplate@2x.png

# ---- macOS -------------------------------------------------------------------

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.icns
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

afterSign: scripts/notarize.cjs

dmg:
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 190
    - x: 400
      y: 190
      type: link
      path: /Applications

# ---- Windows -----------------------------------------------------------------

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

# ---- Linux -------------------------------------------------------------------

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: resources/icon.png
  category: Office

# ---- Publishing --------------------------------------------------------------

publish:
  provider: github
  owner: ConvexPress
  repo: ConvexPress-Admin
